# 应用配置文件
app:
  name: test-service
  version: "0.1.0"
  debug: true

server:
  host: 0.0.0.0
  port: 8080
  workers: 4

database:
  driver: sqlite
  path: ./data/app.db
  pool_size: 10
  timeout: 30

logging:
  level: INFO
  format: json
  output: stdout

features:
  cache_enabled: true
  rate_limit: 100
  max_upload_size: 10485760
